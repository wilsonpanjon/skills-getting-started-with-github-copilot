<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ecuador Provinces</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      main {
        display: block;
      }

      .provinces-section {
        max-width: 900px;
        margin: 0 auto;
        width: 100%;
      }

      .back-link {
        display: inline-block;
        margin-bottom: 20px;
        color: #1a237e;
        text-decoration: none;
        font-weight: bold;
      }

      .back-link:hover {
        text-decoration: underline;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }

      thead {
        background-color: #1a237e;
        color: white;
      }

      thead th {
        padding: 12px 15px;
        text-align: left;
      }

      tbody tr:nth-child(even) {
        background-color: #f0f4ff;
      }

      tbody tr:hover {
        background-color: #dce3ff;
      }

      tbody td {
        padding: 10px 15px;
        border-bottom: 1px solid #ddd;
      }

      .source-note {
        margin-top: 15px;
        font-size: 0.85rem;
        color: #666;
        font-style: italic;
      }

      .flag-emoji {
        font-size: 1.5rem;
        vertical-align: middle;
        margin-right: 8px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1><span class="flag-emoji">🇪🇨</span>Ecuador Provinces</h1>
      <h2>Capitals &amp; Population — 2026 Statistics</h2>
    </header>

    <main>
      <section class="provinces-section">
        <a href="index.html" class="back-link">← Back to Activities</a>
        <h3>All 24 Provinces</h3>
        <table id="provinces-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Province</th>
              <th>Capital</th>
              <th>Region</th>
              <th>Population (2026 est.)</th>
            </tr>
          </thead>
          <tbody id="provinces-body">
            <!-- Populated by script -->
          </tbody>
        </table>
        <p class="source-note">
          Source: Instituto Nacional de Estadística y Censos (INEC) — 2026 projections.
        </p>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script>
      const provinces = [
        { name: "Azuay",                          capital: "Cuenca",                          region: "Sierra",    population: 903_421 },
        { name: "Bolívar",                         capital: "Guaranda",                        region: "Sierra",    population: 211_574 },
        { name: "Cañar",                           capital: "Azogues",                         region: "Sierra",    population: 268_955 },
        { name: "Carchi",                          capital: "Tulcán",                          region: "Sierra",    population: 187_122 },
        { name: "Chimborazo",                      capital: "Riobamba",                        region: "Sierra",    population: 534_968 },
        { name: "Cotopaxi",                        capital: "Latacunga",                       region: "Sierra",    population: 483_610 },
        { name: "El Oro",                          capital: "Machala",                         region: "Costa",     population: 725_848 },
        { name: "Esmeraldas",                      capital: "Esmeraldas",                      region: "Costa",     population: 614_322 },
        { name: "Galápagos",                       capital: "Puerto Baquerizo Moreno",         region: "Insular",   population:  36_270 },
        { name: "Guayas",                          capital: "Guayaquil",                       region: "Costa",     population: 4_228_180 },
        { name: "Imbabura",                        capital: "Ibarra",                          region: "Sierra",    population: 478_234 },
        { name: "Loja",                            capital: "Loja",                            region: "Sierra",    population: 514_301 },
        { name: "Los Ríos",                        capital: "Babahoyo",                        region: "Costa",     population: 878_651 },
        { name: "Manabí",                          capital: "Portoviejo",                      region: "Costa",     population: 1_578_940 },
        { name: "Morona Santiago",                 capital: "Macas",                           region: "Amazonia",  population: 193_470 },
        { name: "Napo",                            capital: "Tena",                            region: "Amazonia",  population: 132_844 },
        { name: "Orellana",                        capital: "Puerto Francisco de Orellana",    region: "Amazonia",  population: 147_568 },
        { name: "Pastaza",                         capital: "Puyo",                            region: "Amazonia",  population: 133_905 },
        { name: "Pichincha",                       capital: "Quito",                           region: "Sierra",    population: 3_228_450 },
        { name: "Santa Elena",                     capital: "Santa Elena",                     region: "Costa",     population: 374_762 },
        { name: "Santo Domingo de los Tsáchilas",  capital: "Santo Domingo",                   region: "Sierra",    population: 495_810 },
        { name: "Sucumbíos",                       capital: "Nueva Loja",                      region: "Amazonia",  population: 218_537 },
        { name: "Tungurahua",                      capital: "Ambato",                          region: "Sierra",    population: 584_045 },
        { name: "Zamora Chinchipe",                capital: "Zamora",                          region: "Amazonia",  population: 122_389 },
      ];

      const tbody = document.getElementById("provinces-body");

      provinces.forEach((p, i) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td><strong>${p.name}</strong></td>
          <td>${p.capital}</td>
          <td>${p.region}</td>
          <td>${p.population.toLocaleString("en-US")}</td>
        `;
        tbody.appendChild(tr);
      });
    </script>
  </body>
</html>
